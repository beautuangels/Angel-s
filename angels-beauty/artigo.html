<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artigo — Angel's Beauty</title>
<meta name="description" content="Dicas da Especialista Angel's Beauty — cuidado capilar profissional explicado de forma simples.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260722182602">
</head>
<body data-page="dicas">

<div class="page-head" id="head">
  <div class="wrap">
    <span class="eyebrow" id="aCat">Dicas da Especialista</span>
    <h1 id="aTitle">Artigo</h1>
  </div>
</div>

<section class="section--tight">
  <div class="wrap">
    <article class="article" id="body"></article>
    <div class="article" style="padding-bottom:0">
      <div class="cta-band rv" style="padding:44px 40px">
        <div>
          <h2 style="font-size:24px">Quer uma indicação personalizada?</h2>
          <p>Fale com a nossa especialista no WhatsApp — é grátis e sem compromisso.</p>
        </div>
        <a class="btn btn--gold" id="waArt" target="_blank" rel="noopener">Falar no WhatsApp</a>
      </div>
    </div>
  </div>
</section>

<section class="section section--tight" style="padding-bottom:90px">
  <div class="wrap">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:40px">
      <div>
        <span class="eyebrow rv">Continue lendo</span>
        <h2 class="h-section rv" style="margin-bottom:0;font-size:30px">Mais dicas da especialista</h2>
      </div>
      <a class="link-gold rv" href="dicas.html">Todos os artigos</a>
    </div>
    <div class="art-grid" id="more"></div>
  </div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/articles.js"></script>
<script src="js/app.js?v=20260722182602"></script>
<script>
document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons;
  const id = new URLSearchParams(location.search).get('id');
  const a = window.ARTICLES.find(function(x){return x.id===id}) || window.ARTICLES[0];

  document.title = a.titulo + " — Angel's Beauty";
  document.querySelector('meta[name="description"]').content = a.resumo;
  document.getElementById('aCat').textContent = a.cat;
  document.getElementById('aTitle').textContent = a.titulo;
  document.getElementById('body').innerHTML =
    '<div class="article__meta"><span>'+a.tempo+'</span><span>·</span><span>Curadoria Angel\'s Beauty</span></div>' + a.corpo;
  document.getElementById('waArt').href = AB.waLink('Olá! Li o artigo "'+a.titulo+'" no site da Angel’s Beauty e gostaria de uma indicação personalizada para o meu cabelo.');

  document.getElementById('more').innerHTML = window.ARTICLES.filter(function(x){return x.id!==a.id}).slice(0,3).map(function(x,i){
    return '<a class="acard rv rv-d'+(i+1)+'" href="artigo.html?id='+x.id+'">'+
      '<div class="acard__media" style="--tint1:'+x.tint1+';--tint2:'+x.tint2+'">'+I[x.icone]+'</div>'+
      '<div class="acard__body"><span class="acard__cat">'+x.cat+'</span><h3>'+x.titulo+'</h3>'+
      '<p>'+x.resumo+'</p><span class="acard__meta">'+x.tempo+'</span></div></a>';
  }).join('');
  AB.reveal();
  window.scrollTo(0,0);
});
</script>
</body>
</html>
