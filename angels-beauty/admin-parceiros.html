<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Painel de Parceiros — Angel's Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260722182602">
<style>
  .admin-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr auto;gap:16px;align-items:center;
    background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:18px 22px;margin-bottom:12px}
  .admin-row h4{font-size:15px;margin-bottom:3px}
  .admin-row small{color:var(--muted-fg);font-size:11.5px}
  .admin-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:5px 11px;border-radius:100px;font-weight:600}
  .admin-tag.pendente{background:var(--gold-faint);color:var(--gold-ink)}
  .admin-tag.aprovado{background:rgba(80,150,110,.14);color:#4C9B6E}
  .admin-tag.reprovado{background:rgba(176,82,74,.12);color:#C0685E}
  .admin-actions{display:flex;gap:8px}
  .admin-actions button{padding:9px 16px;border-radius:100px;font-size:11.5px;font-weight:600;letter-spacing:.04em}
  .admin-actions .ok{background:#4C9B6E;color:#fff}
  .admin-actions .no{background:transparent;border:1px solid var(--edge);color:var(--body-fg)}
  @media (max-width:900px){.admin-row{grid-template-columns:1fr 1fr;grid-auto-rows:auto}.admin-actions{grid-column:1/-1}}
</style>
</head>
<body data-page="">

<div class="page-head">
  <div class="wrap">
    <span class="eyebrow">Restrito</span>
    <h1>Painel de Parceiros</h1>
    <p class="lead" style="margin:0 auto">Aprove ou recuse cadastros de cabeleireiros parceiros.</p>
  </div>
</div>

<section class="section--tight" style="padding-bottom:100px">
  <div class="wrap" style="max-width:960px">

    <div id="fbNotice" class="auth-note" style="display:none">Firebase ainda não configurado — veja js/firebase-config.js.</div>

    <div id="loginArea" class="auth-wrap" style="display:none">
      <div class="auth-card" style="max-width:420px;margin:0 auto">
        <div class="auth-error" id="errAdmin"></div>
        <form id="formAdminLogin">
          <div class="afield"><label>E-mail</label><input type="email" name="email" required></div>
          <div class="afield"><label>Senha</label><input type="password" name="senha" required></div>
          <button type="submit" class="btn btn--dark btn--block">Entrar</button>
        </form>
      </div>
    </div>

    <div id="deniedArea" style="display:none" class="status-box rejected">
      <div class="status-box__ico" id="deniedIco"></div>
      <h2>Acesso restrito</h2>
      <p>Esta conta não tem permissão para ver o painel de parceiros.</p>
      <button class="act-pill" id="btnLogoutDenied">Sair</button>
    </div>

    <div id="panelArea" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:12px">
        <span class="catalog__count" id="countSummary"></span>
        <button class="act-pill" id="btnLogout">Sair</button>
      </div>
      <div id="listArea"></div>
    </div>

  </div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/app.js?v=20260722182602"></script>
<script src="js/firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons;

  if(!window.AB_FIREBASE_READY){
    document.getElementById('fbNotice').style.display = 'block';
    return;
  }

  const app = initializeApp(window.AB_FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMINS = (window.AB_ADMIN_EMAILS||[]).map(function(e){return e.toLowerCase()});

  function show(id){
    ['loginArea','deniedArea','panelArea'].forEach(function(x){
      document.getElementById(x).style.display = x===id ? '' : 'none';
    });
  }

  document.getElementById('formAdminLogin').addEventListener('submit', function(e){
    e.preventDefault();
    const f = new FormData(e.target);
    const err = document.getElementById('errAdmin');
    err.classList.remove('on');
    signInWithEmailAndPassword(auth, f.get('email'), f.get('senha'))
      .catch(function(){ err.textContent = 'E-mail ou senha incorretos.'; err.classList.add('on'); });
  });

  document.getElementById('btnLogoutDenied').addEventListener('click', function(){ signOut(auth); });

  function loadList(){
    const listEl = document.getElementById('listArea');
    listEl.innerHTML = '<p style="color:var(--muted-fg);text-align:center;padding:40px 0">Carregando…</p>';
    getDocs(query(collection(db,'parceiros'), orderBy('criadoEm','desc'))).then(function(snap){
      const rows = [];
      snap.forEach(function(d){ rows.push(Object.assign({id:d.id}, d.data())); });
      const pend = rows.filter(function(r){return (r.status||'pendente')==='pendente'}).length;
      document.getElementById('countSummary').innerHTML = '<b>'+rows.length+'</b> cadastros · <b>'+pend+'</b> pendente'+(pend===1?'':'s');
      if(!rows.length){ listEl.innerHTML = '<p style="color:var(--muted-fg);text-align:center;padding:40px 0">Nenhum cadastro ainda.</p>'; return; }
      listEl.innerHTML = rows.map(function(r){
        const status = r.status || 'pendente';
        return '<div class="admin-row" data-id="'+r.id+'">'+
          '<div><h4>'+AB.esc(r.nome||'—')+'</h4><small>'+AB.esc(r.email||'')+'</small></div>'+
          '<div><small>WhatsApp</small><br>'+AB.esc(r.whatsapp||'—')+'</div>'+
          '<div><small>Salão / Cidade</small><br>'+AB.esc(r.salao||'—')+' · '+AB.esc(r.cidade||'—')+'</div>'+
          '<div><span class="admin-tag '+status+'">'+status+'</span></div>'+
          '<div class="admin-actions">'+
            '<button class="ok" data-act="aprovado">Aprovar</button>'+
            '<button class="no" data-act="reprovado">Recusar</button>'+
          '</div>'+
        '</div>';
      }).join('');
    });
  }

  document.getElementById('listArea').addEventListener('click', function(e){
    const b = e.target.closest('[data-act]'); if(!b) return;
    const row = b.closest('.admin-row');
    updateDoc(doc(db,'parceiros',row.dataset.id), {status: b.dataset.act}).then(loadList);
  });

  document.getElementById('btnLogout').addEventListener('click', function(){ signOut(auth); });

  onAuthStateChanged(auth, function(user){
    if(!user){ show('loginArea'); return; }
    if(ADMINS.indexOf((user.email||'').toLowerCase()) === -1){
      document.getElementById('deniedIco').innerHTML = I.x;
      show('deniedArea');
      return;
    }
    show('panelArea');
    loadList();
  });
});
</script>
</body>
</html>
