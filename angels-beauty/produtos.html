<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos — Angel's Beauty | Cosméticos Profissionais Originais</title>
<meta name="description" content="Catálogo completo de cosméticos profissionais: shampoos, máscaras e tratamentos L'Oréal Professionnel, Joico, Wella, Sebastian e Senscience. Solicite seu orçamento pelo WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260722182602">
</head>
<body data-page="produtos">

<div class="page-head">
  <div class="wrap">
    <span class="eyebrow">Catálogo premium</span>
    <h1>Nossos produtos</h1>
    <p class="lead" style="margin:0 auto">Somente fórmulas profissionais, originais e aprovadas pela curadoria Angel's Beauty.</p>
  </div>
</div>

<section class="section--tight" style="padding-top:34px">
  <div class="wrap">
    <div class="catalog">

      <!-- FILTROS -->
      <aside class="filters" id="filters" aria-label="Filtros">
        <button class="icon-btn fdrawer-close" id="fClose" aria-label="Fechar filtros">✕</button>
        <div class="fgroup">
          <h4>Marca <button class="fclear" id="fClear">Limpar</button></h4>
          <div id="fMarca"></div>
        </div>
        <div class="fgroup">
          <h4>Categoria</h4>
          <div id="fCat"></div>
        </div>
        <div class="fgroup">
          <h4>Necessidade &amp; Tratamento</h4>
          <div id="fNeed"></div>
        </div>
      </aside>

      <!-- LISTA -->
      <div>
        <div class="searchbar" id="buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="search" id="q" placeholder="Buscar por produto, linha ou marca…" autocomplete="off">
        </div>
        <div class="catalog__top">
          <span class="catalog__count" id="count"></span>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn btn--outline btn--sm fdrawer-btn" id="fOpen">Filtros</button>
            <label class="sort">Ordenar por
              <select id="sort">
                <option value="best">Mais vendidos</option>
                <option value="rec">Mais recentes</option>
                <option value="az">Ordem alfabética</option>
              </select>
            </label>
          </div>
        </div>
        <div class="chipbar" id="chips"></div>
        <div class="prod-grid" id="grid"></div>
        <div class="empty" id="empty" style="display:none">
          <h3>Nenhum produto encontrado</h3>
          <p>Tente remover algum filtro ou buscar por outro termo.</p>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/app.js?v=20260722182602"></script>
<script>
document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons;
  const ALL = AB.products();

  const MARCAS = [
    ['loreal',"L'Oréal Professionnel"],
    ['joico','Joico'],
    ['wella','Wella Professionals'],
    ['sebastian','Sebastian Professional'],
    ['senscience','Senscience']
  ];
  const CATS = [
    ['shampoo','Shampoos'],
    ['condicionador','Condicionadores'],
    ['mascara','Máscaras'],
    ['tratamento','Tratamentos']
  ];
  const NEEDS = [
    ['reconstrucao','Reconstrução'],
    ['hidratacao','Hidratação'],
    ['nutricao','Nutrição'],
    ['antiqueda','Antiqueda'],
    ['protecao-cor','Proteção da Cor'],
    ['loiros','Loiros'],
    ['coloridos','Coloridos'],
    ['cacheados','Cacheados'],
    ['frizz','Controle de Frizz'],
    ['volume','Volume'],
    ['protecao-termica','Proteção térmica'],
    ['couro-cabeludo','Couro Cabeludo'],
    ['danificados','Cabelos danificados'],
    ['oleosos','Cabelos oleosos'],
    ['grisalhos','Grisalhos']
  ];
  const marcaSlug = function(p){
    const m = p.marca.toLowerCase();
    if(m.indexOf('oréal')>-1||m.indexOf('oreal')>-1) return 'loreal';
    if(m.indexOf('joico')>-1) return 'joico';
    if(m.indexOf('wella')>-1) return 'wella';
    if(m.indexOf('sebastian')>-1) return 'sebastian';
    return 'senscience';
  };

  const state = { marca:[], cat:[], need:[], q:'', sort:'best', fav:false };

  /* URL params */
  const params = new URLSearchParams(location.search);
  if(params.get('marca')) state.marca = [params.get('marca')];
  if(params.get('cat')) state.cat = [params.get('cat')];
  if(params.get('need')) state.need = [params.get('need')];
  if(params.get('q')) state.q = params.get('q');
  if(params.get('fav')) state.fav = true;

  function countBy(fn){ const m={}; ALL.forEach(function(p){ fn(p).forEach(function(k){ m[k]=(m[k]||0)+1; }); }); return m; }
  const nMarca = countBy(function(p){return [marcaSlug(p)]});
  const nCat   = countBy(function(p){return [p.cat]});
  const nNeed  = countBy(function(p){return p.needs||[]});

  function optHTML(group, arr, counts){
    return arr.map(function(o){
      const checked = state[group].indexOf(o[0])>-1 ? 'checked' : '';
      return '<label class="fopt"><input type="checkbox" data-group="'+group+'" value="'+o[0]+'" '+checked+'>'+
        '<span class="box">'+I.check+'</span>'+o[1]+'<span class="n">'+(counts[o[0]]||0)+'</span></label>';
    }).join('');
  }
  document.getElementById('fMarca').innerHTML = optHTML('marca', MARCAS, nMarca);
  document.getElementById('fCat').innerHTML   = optHTML('cat', CATS, nCat);
  document.getElementById('fNeed').innerHTML  = optHTML('need', NEEDS, nNeed);
  document.getElementById('q').value = state.q;

  function apply(){
    let list = ALL.slice();
    if(state.fav){ const f = AB.fav.all(); list = list.filter(function(p){return f.indexOf(p.id)>-1}); }
    if(state.marca.length) list = list.filter(function(p){return state.marca.indexOf(marcaSlug(p))>-1});
    if(state.cat.length)   list = list.filter(function(p){return state.cat.indexOf(p.cat)>-1});
    if(state.need.length)  list = list.filter(function(p){return state.need.some(function(n){return (p.needs||[]).indexOf(n)>-1})});
    if(state.q){
      const q = state.q.toLowerCase();
      list = list.filter(function(p){
        return (p.nome+' '+p.marca+' '+p.linha+' '+p.desc).toLowerCase().indexOf(q)>-1;
      });
    }
    if(state.sort==='az') list.sort(function(a,b){return a.nome.localeCompare(b.nome,'pt')});
    else if(state.sort==='rec') list.sort(function(a,b){return a.rec-b.rec});
    else list.sort(function(a,b){return a.best-b.best});

    document.getElementById('count').innerHTML = '<b>'+list.length+'</b> produto'+(list.length===1?'':'s')+(state.fav?' favoritado'+(list.length===1?'':'s'):'');
    document.getElementById('grid').innerHTML = list.map(function(p,i){
      let tag = '';
      if(state.sort==='best' && p.best<=3) tag = 'Mais vendido';
      else if(p.rec<=3) tag = 'Novidade';
      return AB.cardHTML(p, tag);
    }).join('');
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';
    renderChips();
    AB.reveal();
  }

  function renderChips(){
    const chips = [];
    const label = function(arr, v){ const f = arr.find(function(x){return x[0]===v}); return f?f[1]:v; };
    state.marca.forEach(function(v){ chips.push(['marca',v,label(MARCAS,v)]); });
    state.cat.forEach(function(v){ chips.push(['cat',v,label(CATS,v)]); });
    state.need.forEach(function(v){ chips.push(['need',v,label(NEEDS,v)]); });
    if(state.fav) chips.push(['fav','1','Meus favoritos']);
    document.getElementById('chips').innerHTML = chips.map(function(c){
      return '<span class="chip">'+c[2]+'<button data-g="'+c[0]+'" data-v="'+c[1]+'" aria-label="Remover filtro">✕</button></span>';
    }).join('');
  }

  document.getElementById('chips').addEventListener('click', function(e){
    const b = e.target.closest('button'); if(!b) return;
    if(b.dataset.g==='fav'){ state.fav=false; }
    else {
      state[b.dataset.g] = state[b.dataset.g].filter(function(v){return v!==b.dataset.v});
      const inp = document.querySelector('.fopt input[data-group="'+b.dataset.g+'"][value="'+b.dataset.v+'"]');
      if(inp) inp.checked = false;
    }
    apply();
  });

  document.getElementById('filters').addEventListener('change', function(e){
    const inp = e.target; if(!inp.dataset.group) return;
    const g = inp.dataset.group, v = inp.value;
    if(inp.checked){ if(state[g].indexOf(v)<0) state[g].push(v); }
    else state[g] = state[g].filter(function(x){return x!==v});
    apply();
  });
  document.getElementById('fClear').addEventListener('click', function(){
    state.marca=[]; state.cat=[]; state.need=[]; state.fav=false;
    document.querySelectorAll('.fopt input').forEach(function(i){i.checked=false});
    apply();
  });
  let deb;
  document.getElementById('q').addEventListener('input', function(e){
    clearTimeout(deb);
    deb = setTimeout(function(){ state.q = e.target.value.trim(); apply(); }, 220);
  });
  document.getElementById('sort').addEventListener('change', function(e){ state.sort = e.target.value; apply(); });

  /* drawer mobile */
  document.getElementById('fOpen').addEventListener('click', function(){ document.getElementById('filters').classList.add('open'); });
  document.getElementById('fClose').addEventListener('click', function(){ document.getElementById('filters').classList.remove('open'); });

  apply();
});
</script>
</body>
</html>
