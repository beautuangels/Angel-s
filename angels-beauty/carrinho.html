<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha sacola — Angel's Beauty</title>
<meta name="description" content="Revise sua sacola e finalize seu pedido pelo WhatsApp. Orçamento personalizado em minutos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="carrinho">

<div class="page-head">
  <div class="wrap">
    <span class="eyebrow">Quase lá</span>
    <h1>Minha sacola</h1>
    <p class="lead" style="margin:0 auto">Revise seus produtos e finalize — o orçamento chega em minutos no seu WhatsApp.</p>
  </div>
</div>

<section class="section--tight" style="padding-top:40px">
  <div class="wrap" id="cartWrap"></div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons, esc = AB.esc;
  const wrap = document.getElementById('cartWrap');

  function render(){
    const items = AB.cart.all();
    if(!items.length){
      wrap.innerHTML = '<div class="cart-empty">'+I.bag+
        '<h2>Sua sacola está vazia</h2>'+
        '<p>Explore nossa curadoria e encontre o tratamento perfeito para o seu cabelo.</p>'+
        '<a href="produtos.html" class="btn btn--dark">Conhecer produtos</a></div>';
      return;
    }
    const rows = items.map(function(it){
      const p = AB.byId(it.id);
      if(!p) return '';
      return '<div class="citem" data-id="'+p.id+'">'+
        '<a class="citem__media" href="produto.html?id='+p.id+'">'+AB.productImgTag(p)+'</a>'+
        '<div>'+
          '<span class="citem__brand">'+esc(p.marca)+'</span>'+
          '<h3 class="citem__name"><a href="produto.html?id='+p.id+'">'+esc(p.nome)+'</a></h3>'+
          '<span class="citem__meta">'+esc(p.linha)+' · '+esc(p.vol)+'</span>'+
        '</div>'+
        '<div class="citem__right">'+
          '<div class="qty"><button data-a="minus" aria-label="Diminuir">−</button><span>'+it.qty+'</span><button data-a="plus" aria-label="Aumentar">+</button></div>'+
          '<button class="citem__rm" data-a="rm">'+I.trash+' Remover</button>'+
        '</div>'+
      '</div>';
    }).join('');

    const total = AB.cart.count();
    wrap.innerHTML =
    '<div class="cart-layout">'+
      '<div>'+
        '<div class="cart-list">'+rows+'</div>'+
        '<div style="margin-top:26px"><a href="produtos.html" class="act-pill">← Continuar comprando</a></div>'+
      '</div>'+
      '<aside class="cart-side">'+
        '<h3>Resumo do pedido</h3>'+
        '<p>Confira os itens antes de solicitar seu orçamento.</p>'+
        '<div class="cart-side__row"><span>Produtos</span><b>'+items.length+'</b></div>'+
        '<div class="cart-side__row"><span>Quantidade total</span><b>'+total+' item'+(total>1?'s':'')+'</b></div>'+
        '<div class="cart-side__note">'+I.wa+'<span>Ao finalizar, sua sacola é enviada automaticamente para o nosso WhatsApp — você recebe o orçamento personalizado em minutos, sem compromisso.</span></div>'+
        '<a class="btn btn--wa btn--block" id="checkout" target="_blank" rel="noopener">'+I.wa+' Finalizar pedido</a>'+
        '<a class="btn btn--outline btn--block" href="produtos.html">Continuar comprando</a>'+
      '</aside>'+
    '</div>';

    document.getElementById('checkout').href = AB.waOrderLink(items);
  }

  wrap.addEventListener('click', function(e){
    const b = e.target.closest('[data-a]'); if(!b) return;
    const id = b.closest('.citem').dataset.id;
    const it = AB.cart.all().find(function(x){return x.id===id});
    if(!it) return;
    if(b.dataset.a==='plus') AB.cart.setQty(id, Math.min(99, it.qty+1));
    else if(b.dataset.a==='minus') AB.cart.setQty(id, it.qty-1);
    else if(b.dataset.a==='rm'){ AB.cart.remove(id); AB.toast('Produto removido da sacola'); }
    render();
  });

  render();
});
</script>
</body>
</html>
