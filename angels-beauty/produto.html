<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto — Angel's Beauty</title>
<meta name="description" content="Detalhes completos do produto: benefícios, tecnologia, ativos, modo de uso e avaliações. Solicite seu orçamento pelo WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="produtos">

<div class="wrap">
  <nav class="crumbs" id="crumbs" aria-label="Você está aqui"></nav>
  <div class="pdp" id="pdp"></div>
</div>

<div class="wrap pinfo" id="pinfo"></div>

<section class="section section--ivory" id="faqSec" style="display:none">
  <div class="wrap" style="max-width:860px">
    <div class="center">
      <span class="eyebrow rv">Dúvidas sobre este produto</span>
      <h2 class="h-section rv">Perguntas frequentes</h2>
    </div>
    <div class="acc rv" id="pfaq" style="margin-top:40px"></div>
  </div>
</section>

<section class="section" id="revSec" style="display:none">
  <div class="wrap">
    <div class="center" style="margin-bottom:44px">
      <span class="eyebrow rv">Quem usa, aprova</span>
      <h2 class="h-section rv">Avaliações de clientes</h2>
      <p class="lead rv" id="revSummary"></p>
    </div>
    <div class="rev-grid" id="revGrid"></div>
  </div>
</section>

<section class="section section--tight" id="relSec" style="display:none;padding-bottom:90px">
  <div class="wrap">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:40px">
      <div>
        <span class="eyebrow rv">Complete o ritual</span>
        <h2 class="h-section rv" style="margin-bottom:0">Produtos que combinam</h2>
      </div>
      <a class="link-gold rv" href="produtos.html">Ver catálogo</a>
    </div>
    <div class="prod-grid" id="relGrid"></div>
  </div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons, esc = AB.esc;
  const id = new URLSearchParams(location.search).get('id');
  const p = AB.byId(id) || AB.products()[0];
  if(!p){ location.href = 'produtos.html'; return; }

  document.title = p.nome + ' — ' + p.marca + " | Angel's Beauty";
  document.querySelector('meta[name="description"]').content = p.desc + ' Produto original ' + p.marca + '. Orçamento pelo WhatsApp.';

  /* breadcrumbs */
  document.getElementById('crumbs').innerHTML =
    '<a href="index.html">Início</a> / <a href="produtos.html">Produtos</a> / <a href="produtos.html?marca=' +
    (p.marca.toLowerCase().indexOf('or')>-1&&p.marca.indexOf('L')===0?'loreal':p.marcaCurta.toLowerCase()) + '">'+esc(p.marca)+'</a> / <span style="color:var(--fg)">'+esc(p.nome)+'</span>';

  /* galeria + resumo de compra */
  const revs = AB.reviewsFor(p);
  const media = (revs.reduce(function(s,r){return s+r.nota},0)/revs.length).toFixed(1).replace('.',',');
  const starsOf = AB.starsOf;

  document.getElementById('pdp').innerHTML =
  '<div class="pdp__gallery">'+
    '<div class="pdp__main" id="zoomBox">'+AB.productImgTag(p, ' id="mainImg"')+
      '<span class="pdp__zoomhint">'+I.zoom+' Clique para zoom</span></div>'+
    '<div class="pdp__thumbs">'+
      '<button class="pdp__thumb on">'+AB.productImgTag(p)+'</button>'+
      '<button class="pdp__thumb">'+AB.productImgTag(p, ' style="transform:rotate(-8deg)"')+'</button>'+
      '<button class="pdp__thumb">'+AB.productImgTag(p, ' style="transform:scale(.8)"')+'</button>'+
    '</div>'+
  '</div>'+
  '<div>'+
    '<div class="pdp__brand">'+esc(p.marca)+' · '+esc(p.serie || p.linha)+'</div>'+
    '<h1 class="pdp__title">'+esc(p.nome)+'</h1>'+
    '<p class="pdp__sub">Linha <b>'+esc(p.linha)+'</b> · Categoria <b>'+cat(p.cat)+'</b> · <b>'+esc(p.vol)+'</b></p>'+
    '<div class="pdp__rating"><span class="stars">'+starsOf(media.replace(',','.'))+'</span> '+media+' · '+revs.length+' avaliações · <span style="color:var(--gold)">Produto original</span></div>'+
    '<p class="pdp__desc">'+esc(p.desc)+'</p>'+
    '<div class="pdp__quote">“'+esc(p.resultado)+'”</div>'+
    '<div class="pdp__actions">'+
      '<button class="act-pill '+(AB.fav.has(p.id)?'is-fav':'')+'" id="favBtn">'+I.heart+' Favoritar</button>'+
      '<button class="act-pill" id="shareBtn">'+I.share+' Compartilhar</button>'+
    '</div>'+
    '<div class="pdp__buy">'+
      '<div class="pdp__buyrow">'+
        '<div class="qty" id="pQty"><button id="qMinus" aria-label="Diminuir">−</button><span id="qVal">1</span><button id="qPlus" aria-label="Aumentar">+</button></div>'+
        '<button class="btn btn--dark" id="addBtn">'+I.bag+' Adicionar ao carrinho</button>'+
      '</div>'+
      '<a class="btn btn--wa btn--block" id="waBtn" target="_blank" rel="noopener">'+I.wa+' Comprar pelo WhatsApp</a>'+
      '<p class="pdp__hint">Sem preço no site: você recebe um orçamento personalizado em minutos, direto no WhatsApp.</p>'+
    '</div>'+
    '<div class="pdp__ship">'+
      '<div>'+I.shield+' 100% original e lacrado</div>'+
      '<div>'+I.truck+' Entrega rápida</div>'+
      '<div>'+I.chat+' Curadoria especializada</div>'+
    '</div>'+
  '</div>';

  function cat(c){ return {shampoo:'Shampoo',condicionador:'Condicionador',mascara:'Máscara',tratamento:'Tratamento'}[c]||c; }

  /* zoom + thumbs */
  const zoomBox = document.getElementById('zoomBox');
  zoomBox.addEventListener('click', function(){ zoomBox.classList.toggle('zoomed'); });
  document.querySelectorAll('.pdp__thumb').forEach(function(t){
    t.addEventListener('click', function(){
      document.querySelectorAll('.pdp__thumb').forEach(function(x){x.classList.remove('on')});
      t.classList.add('on');
      document.getElementById('mainImg').style.transform = t.querySelector('img').style.transform;
    });
  });

  /* compra */
  let qty = 1;
  const qVal = document.getElementById('qVal');
  const waBtn = document.getElementById('waBtn');
  function syncWa(){ waBtn.href = AB.waProductLink(p, qty); }
  document.getElementById('qPlus').addEventListener('click', function(){ qty=Math.min(99,qty+1); qVal.textContent=qty; syncWa(); });
  document.getElementById('qMinus').addEventListener('click', function(){ qty=Math.max(1,qty-1); qVal.textContent=qty; syncWa(); });
  document.getElementById('addBtn').addEventListener('click', function(){ AB.cart.add(p.id, qty); });
  document.getElementById('favBtn').addEventListener('click', function(){ this.classList.toggle('is-fav', AB.fav.toggle(p.id)); });
  document.getElementById('shareBtn').addEventListener('click', function(){ AB.share(p); });
  syncWa();

  /* abas de informação */
  const ativos = (p.ativos||[]).map(function(a){return '<span>'+esc(a)+'</span>'}).join('');
  const bens = (p.beneficios||[]).map(function(b){return '<li>'+esc(b)+'</li>'}).join('');
  const modoSteps = p.modo.split(/(?<=\.)\s+/).map(function(s){return '<li>'+esc(s)+'</li>'}).join('');
  const contra = p.contra || 'Uso externo. Evite contato com os olhos — em caso de contato, enxágue abundantemente. Mantenha fora do alcance de crianças. Em caso de irritação, suspenda o uso.';
  const panes = [
    ['Descrição',
      '<div class="pinfo__cols">'+
        '<div class="ibox"><h3>'+I.gem+' Descrição completa</h3><p>'+esc(p.tecnologia)+'</p></div>'+
        '<div class="ibox ibox--gold"><h3>'+I.spark+' Benefícios</h3><ul class="blist">'+bens+'</ul></div>'+
      '</div>'],
    ['Tecnologia & Ativos',
      '<div class="pinfo__cols">'+
        '<div class="ibox"><h3>'+I.spark+' Tecnologia</h3><p>'+esc(p.tecnologia)+'</p></div>'+
        '<div class="ibox"><h3>'+I.leaf+' Principais ativos</h3><div class="alist" style="margin-bottom:18px">'+ativos+'</div>'+
        '<p style="font-size:13px;color:var(--muted-fg)">Ingredientes de destaque divulgados pelo fabricante. A lista completa de ingredientes (INCI) está na embalagem do produto.</p></div>'+
      '</div>'],
    ['Modo de uso',
      '<div class="pinfo__cols">'+
        '<div class="ibox"><h3>'+I.drop+' Como usar</h3><ol class="steps">'+modoSteps+'</ol></div>'+
        '<div class="ibox ibox--gold"><h3>'+I.check+' Resultado esperado</h3><p>'+esc(p.resultado)+'</p>'+
        '<h3 style="margin-top:24px">'+I.shield+' Contraindicações</h3><p>'+esc(contra)+'</p></div>'+
      '</div>'],
    ['Indicações',
      '<div class="ibox"><table class="spec-table">'+
        '<tr><td>Indicação</td><td>'+esc(p.indicacao)+'</td></tr>'+
        '<tr><td>Tipos de cabelo</td><td>'+esc(p.tipos)+'</td></tr>'+
        '<tr><td>Frequência de uso</td><td>'+esc(p.freq)+'</td></tr>'+
        '<tr><td>Etapa do cronograma</td><td>'+esc(p.etapa)+'</td></tr>'+
        '<tr><td>Linha</td><td>'+esc(p.linha)+'</td></tr>'+
        '<tr><td>Volume</td><td>'+esc(p.vol)+'</td></tr>'+
        '<tr><td>Marca</td><td>'+esc(p.marca)+'</td></tr>'+
      '</table></div>']
  ];
  document.getElementById('pinfo').innerHTML =
    '<div class="pinfo__tabs">'+panes.map(function(t,i){return '<button class="pinfo__tab'+(i===0?' on':'')+'" data-i="'+i+'">'+t[0]+'</button>'}).join('')+'</div>'+
    panes.map(function(t,i){return '<div class="pinfo__panel'+(i===0?' on':'')+'" data-i="'+i+'">'+t[1]+'</div>'}).join('');
  document.querySelectorAll('.pinfo__tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.pinfo__tab').forEach(function(x){x.classList.remove('on')});
      document.querySelectorAll('.pinfo__panel').forEach(function(x){x.classList.remove('on')});
      tab.classList.add('on');
      document.querySelector('.pinfo__panel[data-i="'+tab.dataset.i+'"]').classList.add('on');
    });
  });

  /* FAQ do produto */
  const defaultFaq = [
    ['Este produto é original?','Sim. A Angel\'s Beauty trabalha exclusivamente com produtos 100% originais e lacrados, de procedência garantida.'],
    ['Como recebo o preço?','Adicione à sacola e finalize o pedido — a mensagem chega pronta no nosso WhatsApp e você recebe o orçamento em minutos.'],
    ['Serve para o meu cabelo?','Na dúvida, chame a gente no WhatsApp antes de comprar: nossa especialista analisa seu caso e confirma se este é o produto ideal.']
  ];
  const faq = (p.faq||[]).concat(defaultFaq);
  document.getElementById('faqSec').style.display = 'block';
  document.getElementById('pfaq').innerHTML = faq.map(function(f){
    return '<div class="acc__item"><button class="acc__q">'+esc(f[0])+I.plus+'</button><div class="acc__a"><p>'+esc(f[1])+'</p></div></div>';
  }).join('');
  document.querySelectorAll('#pfaq .acc__q').forEach(function(q){
    q.addEventListener('click', function(){
      const it = q.parentElement, open = it.classList.contains('open');
      document.querySelectorAll('#pfaq .acc__item').forEach(function(x){ x.classList.remove('open'); x.querySelector('.acc__a').style.maxHeight = null; });
      if(!open){ it.classList.add('open'); it.querySelector('.acc__a').style.maxHeight = it.querySelector('.acc__a').scrollHeight+'px'; }
    });
  });

  /* avaliações */
  document.getElementById('revSec').style.display = 'block';
  document.getElementById('revSummary').textContent = media + ' de 5 — clientes que compraram este produto na Angel\'s Beauty.';
  document.getElementById('revGrid').innerHTML = revs.map(function(r,i){
    return '<div class="rev rv rv-d'+(i+1)+'">'+
      '<div class="rev__head"><span class="rev__avatar">'+r.nome.charAt(0)+'</span>'+
      '<div><div class="rev__name">'+r.nome+'</div><div class="rev__meta">'+r.quando+'</div></div></div>'+
      '<span class="stars">'+starsOf(r.nota)+'</span>'+
      '<p>“'+r.texto+'”</p>'+
      '<span class="rev__verified">'+I.check+' Compra verificada</span></div>';
  }).join('');

  /* relacionados: combina + mesma linha/necessidade */
  let rel = (p.combina||[]).map(AB.byId).filter(Boolean);
  if(rel.length < 3){
    AB.products().forEach(function(x){
      if(rel.length>=3) return;
      if(x.id!==p.id && rel.indexOf(x)<0 && (x.linha===p.linha || (x.needs||[]).some(function(n){return (p.needs||[]).indexOf(n)>-1}))) rel.push(x);
    });
  }
  rel = rel.slice(0,3);
  if(rel.length){
    document.getElementById('relSec').style.display = 'block';
    document.getElementById('relGrid').innerHTML = rel.map(function(x){return AB.cardHTML(x)}).join('');
  }

  AB.reveal();
  window.scrollTo(0,0);
});
</script>
</body>
</html>
