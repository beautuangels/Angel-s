<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem("ab_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dicas da Especialista — Angel's Beauty</title>
<meta name="description" content="Artigos elegantes sobre cuidado capilar profissional: cronograma capilar, cabelos coloridos, reconstrução, proteção térmica e muito mais.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260722182602">
</head>
<body data-page="dicas">

<div class="page-head">
  <div class="wrap">
    <span class="eyebrow">Dicas da Especialista</span>
    <h1>Beleza começa com informação</h1>
    <p class="lead" style="margin:0 auto">Conteúdo técnico traduzido para o dia a dia — para você entender o seu cabelo antes de tratar dele.</p>
  </div>
</div>

<section class="section--tight" style="padding-bottom:100px">
  <div class="wrap">
    <div class="art-grid" id="grid"></div>
  </div>
</section>

<script src="js/data-loreal.js"></script>
<script src="js/data-marcas.js"></script>
<script src="js/articles.js"></script>
<script src="js/app.js?v=20260722182602"></script>
<script>
document.addEventListener('ab:ready', function(){
  const AB = window.AB, I = AB.icons;
  document.getElementById('grid').innerHTML = window.ARTICLES.map(function(a,i){
    return '<a class="acard rv rv-d'+(i%3+1)+'" href="artigo.html?id='+a.id+'">'+
      '<div class="acard__media" style="--tint1:'+a.tint1+';--tint2:'+a.tint2+'">'+I[a.icone]+'</div>'+
      '<div class="acard__body"><span class="acard__cat">'+a.cat+'</span><h3>'+a.titulo+'</h3>'+
      '<p>'+a.resumo+'</p><span class="acard__meta">'+a.tempo+'</span></div></a>';
  }).join('');
  AB.reveal();
});
</script>
</body>
</html>
